name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  desktop-backend:
    name: Desktop Backend Tests (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/desktop/tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Backend Tests
        working-directory: ./apps/desktop/tauri
        run: cargo test --lib --tests

      - name: Run Backend Integration Tests
        working-directory: ./apps/desktop/tauri
        run: cargo test --test "*"

  desktop-frontend:
    name: Desktop Frontend Tests (TypeScript/React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./apps/desktop
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./apps/desktop
        run: npm test -- --run

      - name: Run Frontend Tests with Coverage
        working-directory: ./apps/desktop
        run: npm run test:coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./apps/desktop/coverage/coverage-final.json
          flags: desktop-frontend

  cathedral-typecheck:
    name: Cathedral API Typecheck (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: ./apps/cathedral
        run: pnpm typecheck
